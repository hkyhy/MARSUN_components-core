# 默认任务分类 — 项目可覆盖 plane/taxonomy.yaml

kinds:
  feature:    { label: 功能, color: "#3b82f6", type: Feature }
  enhancement: { label: 优化, color: "#8b5cf6", type: Improvement }
  bug:        { label: 缺陷, color: "#ef4444", type: Bug }
  docs:       { label: 文档, color: "#64748b", type: Task }
  ops:        { label: 运维, color: "#f59e0b", type: Task }
  observability: { label: 可观测, color: "#06b6d4", type: Task }
  chore:      { label: 工程, color: "#94a3b8", type: Task }
  uat:        { label: UAT, color: "#10b981", type: Task }
  deferred:   { label: 延期, color: "#6b7280", type: Task }

domains:
  frontend:
    label: Frontend
    color: "#a855f7"
    keywords: [web, 前端, react, vue, ui, page, admin]
  backend:
    label: Backend
    color: "#0ea5e9"
    keywords: [server, api, route, service, backend]
  infra:
    label: Infra
    color: "#6366f1"
    keywords: [deploy, docker, nginx, ci, infra, migrate]
  docs:
    label: Docs
    color: "#64748b"
    keywords: [readme, 文档, doc, guide]

defaults:
  milestone_kind: feature
  task_kind: feature
