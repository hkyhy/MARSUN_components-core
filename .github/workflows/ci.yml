name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Collect examples
        run: npm run collect-examples

      - name: Typecheck
        run: npm run typecheck

      - name: Build library
        run: npm run build

      - name: Build showcase
        run: npm run build:showcase
        env:
          VITE_BASE_PATH: /MARSUN_components-core/
