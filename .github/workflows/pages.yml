# 首次部署前：Settings → Pages → Source 选「GitHub Actions」
# https://github.com/hkyhy/MARSUN_components-core/settings/pages
name: Deploy GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build showcase
        run: npm run build:showcase
        env:
          VITE_BASE_PATH: /MARSUN_components-core/

      - uses: actions/upload-pages-artifact@v4
        with:
          path: dist-showcase

  deploy:
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v5
