# chore(release) push 触发：校验 version → tag → npm publish（feat push 不自动 bump）
name: Release npm

on:
  push:
    branches: [main]

permissions:
  contents: write
  id-token: write

concurrency:
  group: release-${{ github.repository }}
  cancel-in-progress: false

jobs:
  release:
    if: ${{ startsWith(github.event.head_commit.message, 'chore(release):') }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          registry-url: https://registry.npmjs.org
          cache: npm

      - name: Validate release commit and version
        id: version
        env:
          COMMIT_MSG: ${{ github.event.head_commit.message }}
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=v$VERSION" >> "$GITHUB_OUTPUT"
          FIRST_LINE=$(printf '%s' "$COMMIT_MSG" | head -1)
          if ! echo "$FIRST_LINE" | grep -qE "^chore\(release\): v${VERSION}( |$)"; then
            echo "✗ commit message 首行须为 chore(release): v${VERSION}，当前: $FIRST_LINE"
            exit 1
          fi
          if npm view "@hkyhy/marsun-components-core@${VERSION}" version 2>/dev/null; then
            echo "✗ npm 已存在 @hkyhy/marsun-components-core@${VERSION}"
            exit 1
          fi
          echo "Release v${VERSION}"

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Build library
        run: npm run build

      - name: Create and push tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "${{ steps.version.outputs.tag }}" -m "Release ${{ steps.version.outputs.tag }}"
          git push origin "${{ steps.version.outputs.tag }}"

      - name: Publish to npm
        run: npm publish --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.HKYHY_PACKAGE_PUBLISH }}
